// ─── QUESTION RANDOMIZATION ───────────────────────────────────────────────────
function getRandomFallbackQuestions(skill, experience) {
  const bankKey = SKILL_ALIASES[skill] || null;
  const bank = bankKey ? SKILL_QUESTION_BANK[bankKey] : null;

  if (!bank || bank.length < 5) {
    // Generic fallback for skills without a bank
    return [
      { id:1, type:"text", topic:skill, difficulty:"Medium",
        question:`Explain the core concepts and architecture of ${skill}. How have you applied it in production? What are its main advantages and common pitfalls?` },
      { id:2, type:"code", topic:"Algorithms", difficulty:"Hard",
        question:"Implement a function that finds all pairs in an array summing to a target value. Optimize for O(n) time complexity using a HashMap approach.",
        starterCode:"function findPairs(arr, target) {\n  const seen = new Map();\n  const pairs = [];\n  // implement O(n) solution\n  return pairs;\n}" },
      { id:3, type:"voice", topic:"System Design", difficulty:"Hard",
        question:`Design a scalable ${skill} system for 10,000 requests per second. Discuss architecture decisions, data storage, caching strategy, and failure handling.` },
      { id:4, type:"text", topic:"Best Practices", difficulty:"Medium",
        question:`What are the top 5 best practices for production ${skill} development? Describe a real mistake you made and what you learned from it.` },
      { id:5, type:"code", topic:skill, difficulty:"Medium",
        question:`Implement a common design pattern relevant to ${skill} (e.g., Observer, Factory, or Singleton) with a practical use case from your domain.`,
        starterCode:`// Implement a ${skill}-relevant design pattern\n// Add your code here\n` },
    ];
  }

  // Shuffle and pick 5, ensuring we have at least one of each type if possible
  const shuffled = [...bank].sort(() => Math.random() - 0.5);

  // Try to pick a mix: at least 1 text, 1 code, 1 voice, fill rest randomly
  const byType = { text: [], code: [], voice: [] };
  shuffled.forEach(q => byType[q.type]?.push(q));

  const selected = [];
  if (byType.voice.length)  selected.push(byType.voice[0]);
  if (byType.code.length)   selected.push(byType.code[0]);
  if (byType.code.length>1) selected.push(byType.code[1]);
  if (byType.text.length)   selected.push(byType.text[0]);
  if (byType.text.length>1) selected.push(byType.text[1]);

  // Fill remaining slots from shuffled pool (not already selected)
  const selectedIds = new Set(selected.map(q => q.question));
  for (const q of shuffled) {
    if (selected.length >= 5) break;
    if (!selectedIds.has(q.question)) { selected.push(q); selectedIds.add(q.question); }
  }

  // Adjust difficulty based on experience
  const sorted = selected.slice(0, 5).map((q, i) => ({
    ...q,
    id: i + 1,
    difficulty: experience <= 2
      ? (i < 2 ? "Easy" : q.difficulty)
      : experience >= 7
      ? (i > 2 ? "Hard" : q.difficulty)
      : q.difficulty,
  }));

  return sorted;
}

async function callGemini(prompt, maxTok=1200) {
  const res = await fetch(GEMINI_URL,{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ contents:[{parts:[{text:prompt}]}],
      generationConfig:{maxOutputTokens:maxTok,temperature:0.85} }),
  });
  const d = await res.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

function parseJSON(raw) {
  if (!raw) return null;
  // Strip markdown code blocks
  let cleaned = raw.replace(/```json\s*/gi,"").replace(/```\s*/gi,"").trim();
  // Extract JSON array
  const arrMatch = cleaned.match(/\[[\s\S]*\]/);
  if (arrMatch) {
    try { return JSON.parse(arrMatch[0]); } catch {}
  }
  try { return JSON.parse(cleaned); } catch {}
  return null;
}

function EmotionRadar({ data }) {
  const keys=Object.keys(data), cx=100, cy=100, R=68;
  const pts=keys.map((k,i)=>{
    const a=(i/keys.length)*Math.PI*2-Math.PI/2, v=data[k]/100;
    return {x:cx+R*v*Math.cos(a),y:cy+R*v*Math.sin(a),
      lx:cx+(R+24)*Math.cos(a),ly:cy+(R+24)*Math.sin(a),k};
  });
  const grid=s=>keys.map((_,i)=>{const a=(i/keys.length)*Math.PI*2-Math.PI/2;
    return `${cx+R*s*Math.cos(a)},${cy+R*s*Math.sin(a)}`;}).join(" ");
  return <svg width="200" height="200" style={{overflow:"visible"}}>
    {[.25,.5,.75,1].map(s=><polygon key={s} points={grid(s)} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>)}
    {keys.map((_,i)=>{const a=(i/keys.length)*Math.PI*2-Math.PI/2;
      return <line key={i} x1={cx} y1={cy} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>;
    })}
    <polygon points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill="rgba(0,212,170,0.14)" stroke={C.teal} strokeWidth="2"/>
    {pts.map((p,i)=><g key={i}>
      <circle cx={p.x} cy={p.y} r={4} fill={C.teal}/>
      <text x={p.lx} y={p.ly} fill="rgba(255,255,255,0.45)" fontSize="9" textAnchor="middle" dominantBaseline="middle" fontFamily="monospace">{p.k}</text>
    </g>)}
  </svg>;
}

function TypingText({ text, speed=16 }) {
  const [shown,setShown]=useState(""); const prev=useRef("");
  useEffect(()=>{
    if(text===prev.current) return; prev.current=text; setShown(""); let i=0;
    const t=setInterval(()=>{ if(i<text.length) setShown(text.slice(0,++i)); else clearInterval(t); },speed);
    return ()=>clearInterval(t);
  },[text]);
  return <>{shown}</>;
}

function VoiceAnswer({ onChange }) {
  const [rec,setRec]=useState(false), [trans,setTrans]=useState(""), [typed,setTyped]=useState("");
  const recRef=useRef(null);
  function startV() {
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Speech recognition not supported. Please type your answer.");return;}
    const r=new SR(); r.continuous=true; r.interimResults=true;
    r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join("");setTrans(t);onChange(t);};
    r.onerror=()=>setRec(false); r.start(); recRef.current=r; setRec(true);
  }
  function stopV(){recRef.current?.stop();recRef.current=null;setRec(false);}
  useEffect(()=>()=>recRef.current?.stop(),[]);
  return <Card style={{borderRadius:16}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
      <WaveBar active={rec} bars={26} height={44}/>
      <button onClick={rec?stopV:startV} style={{display:"flex",alignItems:"center",gap:8,
        padding:"10px 24px",border:`1px solid ${rec?"rgba(255,107,107,0.35)":"rgba(0,212,170,0.35)"}`,
        borderRadius:11,color:rec?C.red:C.teal,fontWeight:600,cursor:"pointer",fontSize:14,
        background:rec?"rgba(255,107,107,0.09)":"rgba(0,212,170,0.09)",
        animation:rec?"pulseGlow 1.2s ease-in-out infinite":"none"}}>
        {rec?"⏹ Stop Recording":"🎤 Start Speaking"}
      </button>
      {trans&&<div style={{width:"100%",background:"rgba(255,255,255,0.04)",borderRadius:10,
        padding:12,color:"rgba(255,255,255,0.6)",fontSize:13,lineHeight:1.7,fontStyle:"italic",
        maxHeight:90,overflowY:"auto"}}>"{trans}"</div>}
      <textarea placeholder="Or type your answer here…" value={typed}
        onChange={e=>{setTyped(e.target.value);onChange(e.target.value||trans);}}
        style={{width:"100%",minHeight:80,padding:13,background:"rgba(255,255,255,0.04)",
          border:`1px solid ${C.border}`,borderRadius:11,color:"#fff",fontSize:14,
          lineHeight:1.75,boxSizing:"border-box"}}/>
    </div>
  </Card>;
}

// ─── INTERVIEW SCREEN ─────────────────────────────────────────────────────────
function InterviewScreen({ candidate, onFinish }) {
  const [questions,   setQuestions]   = useState([]);
  const [qIdx,        setQIdx]        = useState(0);
  const [phase,       setPhase]       = useState("generating");
  const [agentMsg,    setAgentMsg]    = useState("Preparing your questions…");
  const [aiSpeaking,  setAiSpeaking]  = useState(false);
  const [feedback,    setFeedback]    = useState(null);
  const [scoreHistory,setScoreHistory]= useState([]);
  const [timeLeft,    setTimeLeft]    = useState(180);
  const [cameraOn,    setCameraOn]    = useState(false);
  const [emotionState,setEmotionState]= useState("focused");
  const [emo,         setEmo]         = useState({Confid:70,Tech:62,Clarity:75,Stress:32,Engage:84});
  const [answer,      setAnswer]      = useState("");
  const [genMsg,      setGenMsg]      = useState("Crafting tailored questions…");

  const videoRef=useRef(null), streamRef=useRef(null), timerRef=useRef(null), emoInterval=useRef(null), emoData=useRef({Confid:70,Tech:62,Clarity:75,Stress:32,Engage:84});

  async function startCam(){
    try{const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      streamRef.current=s; if(videoRef.current) videoRef.current.srcObject=s; setCameraOn(true);}
    catch{setCameraOn(false);}
  }
  function stopCam(){streamRef.current?.getTracks().forEach(t=>t.stop()); streamRef.current=null; setCameraOn(false);}
  function toggleCam(){cameraOn?stopCam():startCam();}

  const speak=useCallback(text=>{
    if(!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.rate=0.95; u.pitch=1.05;
    const v=(window.speechSynthesis.getVoices().find(v=>v.lang==="en-US"&&v.name.includes("Google")))||window.speechSynthesis.getVoices()[0];
    if(v) u.voice=v;
    u.onstart=()=>setAiSpeaking(true); u.onend=()=>setAiSpeaking(false);
    window.speechSynthesis.speak(u);
  },[]);

  useEffect(()=>{
    const keys=Object.keys(EMOTION_MAP);
    emoInterval.current=setInterval(()=>{
      setEmotionState(keys[Math.floor(Math.random()*keys.length)]);
      setEmo(prev=>{
        const n={Confid:clamp(prev.Confid+rand(-6,8),25,99),Tech:clamp(prev.Tech+rand(-4,6),25,99),
          Clarity:clamp(prev.Clarity+rand(-5,7),25,99),Stress:clamp(prev.Stress+rand(-8,8),10,88),
          Engage:clamp(prev.Engage+rand(-4,5),45,99)};
        emoData.current=n; return n;
      });
    },2800);
    return ()=>clearInterval(emoInterval.current);
  },[]);

  // ─── QUESTION GENERATION WITH GEMINI + RANDOM SKILL-SPECIFIC FALLBACK ────────
  useEffect(()=>{
    const skill = candidate.skill;
    const exp   = candidate.experience || 0;
    setGenMsg(`Crafting ${skill}-specific questions with AI…`);

    (async()=>{
      // Build a highly specific, randomized Gemini prompt for this exact skill
      const randomSeed = Math.floor(Math.random() * 10000);
      const difficultyHint = exp <= 2 ? "beginner to intermediate" : exp >= 7 ? "advanced to expert" : "intermediate to advanced";

      const prompt = `You are a senior technical interviewer specializing EXCLUSIVELY in ${skill}.
Generate exactly 5 UNIQUE, RANDOMIZED, and HIGHLY SPECIFIC technical interview questions FOR ${skill} ONLY.
Candidate: ${exp} years experience in ${skill} (${difficultyHint} level).
Random seed for variation: ${randomSeed} — use this to ensure questions are different from previous runs.

STRICT RULES:
1. Every question MUST be specifically about ${skill} — no generic algorithms unless tied to ${skill} use cases.
2. Include ${skill}-specific terminology, APIs, tools, frameworks, and real-world patterns.
3. Questions must vary in topic: core concepts, internals/architecture, performance/optimization, real-world design, debugging/troubleshooting.
4. Mix types: 2 conceptual text questions, 2 coding questions with starter code relevant to ${skill}, 1 voice/system design question.
5. For coding questions, starterCode must use ${skill}-appropriate syntax and imports.
6. Randomize the topics — do NOT repeat the same topics from a standard question list.

Return ONLY a valid JSON array (no markdown, no backticks, no explanation):
[
  {"id":1,"type":"text","topic":"[specific ${skill} topic]","difficulty":"Medium","question":"[specific ${skill} question]"},
  {"id":2,"type":"code","topic":"[specific ${skill} topic]","difficulty":"Hard","question":"[specific coding task in ${skill}]","starterCode":"[real ${skill} starter code with imports]"},
  {"id":3,"type":"voice","topic":"System Design with ${skill}","difficulty":"Hard","question":"[system design question using ${skill}]"},
  {"id":4,"type":"text","topic":"[specific ${skill} topic]","difficulty":"Medium","question":"[specific ${skill} question]"},
  {"id":5,"type":"code","topic":"[specific ${skill} topic]","difficulty":"${exp >= 5 ? 'Hard' : 'Medium'}","question":"[specific coding task]","starterCode":"[real starter code]"}
]`;

      let success = false;
      try {
        const raw = await callGemini(prompt, 1800);
        if (raw && raw.trim()) {
          const parsed = parseJSON(raw);
          if (parsed && Array.isArray(parsed) && parsed.length >= 4) {
            // Validate each question has required fields
            const valid = parsed.every(q => q.id && q.type && q.question && q.question.length > 20);
            if (valid) {
              setQuestions(parsed);
              success = true;
            }
          }
        }
      } catch(e) {
        console.warn("Gemini API failed, using skill-specific fallback:", e);
      }

      // Always use skill-specific random fallback if Gemini fails or returns invalid data
      if (!success) {
        const fallback = getRandomFallbackQuestions(skill, exp);
        setQuestions(fallback);
      }
    })();
  },[candidate]);

  useEffect(()=>{
    if(!questions.length) return;
    if(phase==="generating"){
      setPhase("asking"); startCam();
    }
    const q=questions[qIdx];
    setAnswer(""); setFeedback(null);
    clearInterval(timerRef.current);
    setTimeLeft(180);
    timerRef.current=setInterval(()=>setTimeLeft(t=>t>0?t-1:0),1000);
    const intro=`Question ${q.id} on ${q.topic}. ${q.question}${q.type==="code"?" Please write your solution in the code editor.":""}`;
    setAgentMsg(intro); speak(intro);
    setTimeout(()=>setPhase("answering"),1600);
  },[questions,qIdx]);

  useEffect(()=>()=>{clearInterval(timerRef.current);stopCam();window.speechSynthesis?.cancel();},[]);

  async function submitAnswer(){
    if(phase!=="answering") return;
    window.speechSynthesis?.cancel();
    const q=questions[qIdx];
    const ans=answer||"(No response provided)";
    setPhase("evaluating"); setFeedback({loading:true});
    const prompt=`You are a strict senior ${candidate.skill} technical interviewer. Evaluate accurately.
Question: "${q.question}"
Candidate: ${candidate.name}, ${candidate.skill}, ${candidate.experience} years.
Answer: "${ans}"
Return ONLY valid JSON, no markdown:
{"score":75,"accuracy":70,"feedback":"2-3 sentence technical feedback specific to ${candidate.skill}","strengths":"key strength","improvements":"specific ${candidate.skill} improvement area","verdict":"Excellent|Good|Needs Improvement|Poor"}`;
    try{
      const raw=await callGemini(prompt,600);
      const ev=parseJSON(raw);
      if(ev&&ev.score!==undefined){
        setScoreHistory(p=>[...p,{qId:q.id,topic:q.topic,...ev}]);
        setFeedback(ev);
        const fb=ev.verdict==="Excellent"?`Excellent! ${ev.strengths}. ${ev.feedback}`:ev.verdict==="Good"?`Good. ${ev.feedback}`:`${ev.feedback} Focus: ${ev.improvements}.`;
        setAgentMsg(fb); speak(fb);
      } else throw new Error("Invalid eval response");
    }catch{
      const fb={score:55,accuracy:50,feedback:`Answer recorded. For ${candidate.skill}, aim for structured responses with concrete examples and specific technical terminology.`,strengths:"Attempted the question",improvements:`Deepen your ${candidate.skill} knowledge with hands-on projects`,verdict:"Needs Improvement"};
      setScoreHistory(p=>[...p,{qId:q.id,topic:q.topic,...fb}]);
      setFeedback(fb); setAgentMsg(fb.feedback);
    }
  }

  function nextQuestion(){
    window.speechSynthesis?.cancel(); clearInterval(timerRef.current);
    if(qIdx<questions.length-1){setQIdx(i=>i+1);}
    else{
      stopCam(); clearInterval(emoInterval.current);
      const emoAvg=Math.round((emoData.current.Confid+emoData.current.Tech+emoData.current.Clarity+(100-emoData.current.Stress)+emoData.current.Engage)/5);
      onFinish({candidate,scoreHistory:[...scoreHistory],emo:emoData.current,emoAvg});
    }
  }

  const q=questions[qIdx];
  const emColor=EMOTION_MAP[emotionState]?.color||C.teal;

  if(phase==="generating"||!q){
    return <div style={{height:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <div style={{display:"flex",gap:7}}>
        {[0,1,2,3,4].map(i=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:C.teal,
          animation:`pulseGlow ${.4+i*.15}s ease-in-out infinite`,animationDelay:`${i*.1}s`}}/>)}
      </div>
      <p style={{color:C.dim,fontSize:14}}>{genMsg}</p>
    </div>;
  }

  const tLow=timeLeft<30;
  return <div style={{height:"100vh",background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{display:"flex",alignItems:"center",gap:14,padding:"0 20px",height:50,
      borderBottom:"1px solid rgba(255,255,255,0.05)",background:"rgba(7,11,20,0.97)",
      backdropFilter:"blur(20px)",flexShrink:0,zIndex:100}}>
      <span style={{fontWeight:900,fontSize:16,letterSpacing:-.5}}>Interview<span style={{color:C.teal}}>AI</span></span>
      <span style={{color:"rgba(255,255,255,0.1)"}}>|</span>
      <span style={{color:C.dim,fontSize:13}}>{candidate.name} · {candidate.skill}</span>
      <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
        {questions.map((_,i)=><div key={i} style={{width:i===qIdx?20:7,height:7,borderRadius:4,transition:"all .3s",
          background:i<qIdx?C.teal:i===qIdx?C.teal:"rgba(255,255,255,0.1)"}}/>)}
      </div>
      <div style={{background:tLow?"rgba(255,107,107,0.1)":"rgba(255,255,255,0.05)",
        border:`1px solid ${tLow?"rgba(255,107,107,0.3)":"rgba(255,255,255,0.07)"}`,
        borderRadius:7,padding:"4px 12px",color:tLow?C.red:"rgba(255,255,255,0.5)",
        fontFamily:"'JetBrains Mono'",fontSize:13,fontWeight:600}}>{fmtTime(timeLeft)}</div>
    </div>

    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:18,gap:14,overflowY:"auto",minWidth:0}}>

        <div style={{display:"flex",gap:13,animation:"fadeSlide .4s ease"}}>
          <AIAvatar speaking={aiSpeaking} color={emColor}/>
          <div style={{flex:1,background:"rgba(0,212,170,0.05)",border:"1px solid rgba(0,212,170,0.16)",
            borderRadius:"0 16px 16px 16px",padding:"14px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{color:C.teal,fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>AI Interviewer</span>
              {aiSpeaking&&<Dot size={7}/>}
            </div>
            <p style={{color:"rgba(255,255,255,0.78)",margin:0,fontSize:14,lineHeight:1.75}}>
              {agentMsg?<TypingText text={agentMsg} speed={15}/>
                :<span style={{color:"rgba(255,255,255,0.25)",animation:"shimmer 1.5s ease infinite"}}>Preparing…</span>}
            </p>
          </div>
        </div>

        <Card>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:13,alignItems:"center"}}>
            <Badge color={C.teal}>{q.topic}</Badge>
            <Badge color={q.difficulty==="Hard"?C.red:q.difficulty==="Medium"?C.yellow:C.teal}>{q.difficulty}</Badge>
            <Badge color={C.purple}>{q.type==="voice"?"🎤 Voice":q.type==="code"?"💻 Code":"✍️ Text"}</Badge>
            <span style={{marginLeft:"auto",color:"rgba(255,255,255,0.22)",fontSize:12,alignSelf:"center"}}>Q{qIdx+1}/{questions.length}</span>
          </div>
          <p style={{color:"rgba(255,255,255,0.82)",fontSize:15,lineHeight:1.75,fontWeight:500}}>{q.question}</p>
        </Card>

        {q.type==="code"  && <CodeAnswer  key={`code-${qIdx}`}  starterCode={q.starterCode} onChange={setAnswer}/>}
        {q.type==="voice" && <VoiceAnswer key={`voice-${qIdx}`} onChange={setAnswer}/>}
        {q.type==="text"  && <TextAnswer  key={`text-${qIdx}`}  onChange={setAnswer}/>}

        {feedback&&<div style={{background:"rgba(0,212,170,0.04)",border:"1px solid rgba(0,212,170,0.17)",
          borderRadius:14,padding:17,animation:"fadeSlide .3s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9,flexWrap:"wrap"}}>
            <span style={{color:C.teal,fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>🤖 AI Evaluation</span>
            {!feedback.loading&&<>
              <Badge color={feedback.score>=75?C.teal:feedback.score>=50?C.yellow:C.red}>{feedback.score}pts</Badge>
              <Badge color={C.purple}>{feedback.accuracy}% accuracy</Badge>
              <Badge color={feedback.verdict==="Excellent"?C.teal:feedback.verdict==="Good"?"#4ecdc4":C.yellow}>{feedback.verdict}</Badge>
            </>}
          </div>
          {feedback.loading
            ?<div style={{display:"flex",gap:5,alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.teal,animation:`pulseGlow ${.5+i*.2}s ease-in-out infinite`}}/>)}
              <span style={{color:"rgba(255,255,255,0.3)",fontSize:13,marginLeft:8}}>Analyzing response…</span>
            </div>
            :<p style={{color:"rgba(255,255,255,0.68)",margin:0,fontSize:14,lineHeight:1.7}}>{feedback.feedback}</p>}
        </div>}

        <div style={{display:"flex",gap:12}}>
          {!feedback
            ?<Btn onClick={submitAnswer} disabled={phase!=="answering"} variant="primary" style={{flex:1}}>
              {phase==="asking"?"Listening to question…":phase==="evaluating"?"Evaluating…":"Submit Answer →"}
            </Btn>
            :!feedback.loading&&<Btn onClick={nextQuestion} variant="primary" style={{flex:1}}>
              {qIdx<questions.length-1?`Next Question (${qIdx+2}/${questions.length}) →`:"🎯 Finish & Generate Report"}
            </Btn>}
        </div>
      </div>

      <EmotionSidebar emotionState={emotionState} emo={emo} cameraOn={cameraOn}
        videoRef={videoRef} scoreHistory={scoreHistory} onToggleCamera={toggleCam}/>
    </div>
  </div>;
}

// ─── REPORT SCREEN ────────────────────────────────────────────────────────────
function ReportScreen({ data, currentUser, onBack }) {
  const [report,setReport]=useState(null), [loading,setLoading]=useState(true);
  const {candidate,scoreHistory,emo,emoAvg}=data;
  const avgSc=Math.round(avg(scoreHistory.map(s=>s.score)));
  const avgAc=Math.round(avg(scoreHistory.map(s=>s.accuracy)));

  useEffect(()=>{
    (async()=>{
      const prompt=`Generate a final AI interview selection report.
Candidate: ${candidate.name}, ${candidate.skill}, ${candidate.experience} years.
Scores: ${JSON.stringify(scoreHistory)}
Avg score: ${avgSc}/100, accuracy: ${avgAc}%, emotion index: ${emoAvg}/100.
Return ONLY valid JSON, no markdown:
{"overallScore":${avgSc},"recommendation":"Selected|Hold|Rejected","confidence":82,"summary":"3 sentence executive summary mentioning ${candidate.skill} specifically","strengths":["s1","s2","s3"],"weaknesses":["w1","w2"],"nextSteps":"concrete next step for ${candidate.skill} role","salaryRange":"salary in INR for ${candidate.skill} developer","role":"suggested ${candidate.skill} title based on ${candidate.experience} years experience"}`;
      try{
        const raw=await callGemini(prompt,700);
        const rpt=parseJSON(raw);
        if(rpt&&rpt.recommendation){
          setReport({...rpt,candidate,scoreHistory,emoAvg,avgSc,avgAc});
          if(currentUser&&candidate.username===currentUser.username)
            pushHistory(currentUser.username,{date:new Date().toISOString(),score:rpt.overallScore,recommendation:rpt.recommendation,skill:candidate.skill});
        } else throw new Error();
      }catch{
        setReport({overallScore:avgSc,recommendation:avgSc>=70?"Selected":avgSc>=50?"Hold":"Rejected",
          confidence:74,summary:`${candidate.name} completed the AI interview demonstrating ${avgSc>=70?"strong":"moderate"} ${candidate.skill} knowledge with ${candidate.experience} years of experience.`,
          strengths:["Technical understanding of core concepts","Problem-solving approach","Communication clarity"],
          weaknesses:["Needs more depth in technical answers","Time management under pressure"],
          nextSteps:`Schedule round 2 with the ${candidate.skill} tech lead to evaluate hands-on project experience.`,
          salaryRange:"₹12L–₹18L per annum",
          role:`${candidate.experience>=5?"Senior":"Mid-Level"} ${candidate.skill} Developer`,
          candidate,scoreHistory,emoAvg,avgSc,avgAc});
      }
      setLoading(false);
    })();
  },[]);

  if(loading) return <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
    <div style={{display:"flex",gap:8}}>
      {[0,1,2].map(i=><div key={i} style={{width:12,height:12,borderRadius:"50%",background:C.teal,animation:`pulseGlow ${.5+i*.2}s ease-in-out infinite`,animationDelay:`${i*.2}s`}}/>)}
    </div>
    <p style={{color:C.dim,fontSize:14}}>Generating your selection report…</p>
  </div>;

  const r=report;
  const recC=r.recommendation==="Selected"?C.teal:r.recommendation==="Hold"?C.yellow:C.red;
  const recIcon=r.recommendation==="Selected"?"✅":r.recommendation==="Hold"?"⏸":"❌";

  return <div style={{minHeight:"100vh",background:C.bg,padding:24}}>
    <div style={{maxWidth:780,margin:"0 auto",paddingTop:20,animation:"floatUp .5s ease"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:28,gap:16,flexWrap:"wrap"}}>
        <div>
          <div style={{color:C.dim,fontSize:11,letterSpacing:2.5,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Final AI Evaluation Report</div>
          <h2 style={{fontSize:26,fontWeight:800,letterSpacing:-.5}}>{r.candidate.name}{" "}
            <span style={{color:"rgba(255,255,255,0.25)",fontWeight:300}}>· {r.candidate.skill} Developer</span>
          </h2>
        </div>
        <div style={{padding:"10px 22px",borderRadius:12,fontWeight:700,fontSize:16,
          background:`${recC}18`,color:recC,border:`1px solid ${recC}44`}}>
          {recIcon} {r.recommendation}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:16}}>
        {[{l:"Overall",v:r.avgSc,c:C.teal},{l:"Accuracy",v:r.avgAc,c:C.blue},{l:"Emotion AI",v:r.emoAvg,c:C.purple},{l:"Confidence",v:Math.round(r.confidence),c:C.pink}].map(s=>(
          <Card key={s.l} style={{textAlign:"center",padding:"18px 8px"}}>
            <ScoreRing value={s.v} color={s.c} label={s.l} size={66}/>
          </Card>
        ))}
      </div>

      <Card style={{marginBottom:14}}>
        <p style={{color:C.dim,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:12,fontWeight:600}}>Executive Summary</p>
        <p style={{color:"rgba(255,255,255,0.72)",lineHeight:1.8,fontSize:15,marginBottom:20}}>{r.summary}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div>
            <p style={{color:C.teal,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontWeight:600}}>✓ Strengths</p>
            {r.strengths.map((s,i)=><div key={i} style={{color:C.mid,fontSize:13,marginBottom:7,display:"flex",gap:8}}><span style={{color:C.teal}}>→</span>{s}</div>)}
          </div>
          <div>
            <p style={{color:C.red,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontWeight:600}}>↑ Growth Areas</p>
            {r.weaknesses.map((w,i)=><div key={i} style={{color:C.mid,fontSize:13,marginBottom:7,display:"flex",gap:8}}><span style={{color:C.red}}>→</span>{w}</div>)}
          </div>
        </div>
      </Card>

      <Card style={{marginBottom:14}}>
        <p style={{color:C.dim,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:16,fontWeight:600}}>Question Breakdown</p>
        {r.scoreHistory.map((s,i)=>{
          const sc=s.score;
          const barG=sc>=75?"linear-gradient(90deg,#00d4aa,#0070f3)":sc>=50?"linear-gradient(90deg,#ffd93d,#fd79a8)":"linear-gradient(90deg,#ff6b6b,#ff8e53)";
          const tC=sc>=75?C.teal:sc>=50?C.yellow:C.red;
          const vC=s.verdict==="Excellent"?C.teal:s.verdict==="Good"?"#4ecdc4":s.verdict==="Needs Improvement"?C.yellow:C.red;
          return <div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",
            borderBottom:i<r.scoreHistory.length-1?"1px solid rgba(255,255,255,0.05)":"none"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.05)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,
              color:"rgba(255,255,255,0.35)",flexShrink:0}}>Q{i+1}</div>
            <div style={{flex:1}}>
              <div style={{color:C.mid,fontSize:13,marginBottom:5}}>{s.topic}</div>
              <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:4}}>
                <div style={{height:"100%",width:`${s.score}%`,background:barG,borderRadius:4,transition:"width 1s ease"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap"}}>
              <Badge color={tC}>{s.score}pts</Badge>
              <Badge color={C.purple}>{s.accuracy}%</Badge>
              <Badge color={vC}>{s.verdict}</Badge>
            </div>
          </div>;
        })}
      </Card>

      <Card style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:24}}>
        <div style={{flex:1,minWidth:150}}>
          <p style={{color:C.dim,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Suggested Role</p>
          <p style={{color:"#fff",fontWeight:700,fontSize:15}}>{r.role}</p>
        </div>
        <div style={{flex:1,minWidth:150}}>
          <p style={{color:C.dim,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Salary Range</p>
          <p style={{color:C.teal,fontWeight:700,fontSize:15}}>{r.salaryRange}</p>
        </div>
        <div style={{flex:2,minWidth:190}}>
          <p style={{color:C.dim,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Next Steps</p>
          <p style={{color:C.mid,fontSize:14}}>{r.nextSteps}</p>
        </div>
      </Card>

      <div style={{display:"flex",gap:12}}>
        <Btn onClick={onBack} variant="secondary" style={{flex:1}}>← Back to Dashboard</Btn>
        <Btn onClick={()=>window.print()} variant="primary" style={{flex:1}}>📄 Print / Save Report</Btn>
      </div>
    </div>
  </div>;
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [screen,     setScreen]     = useState("loading");
  const [user,       setUser]       = useState(null);
  const [candidate,  setCandidate]  = useState(null);
  const [interviewData, setIntData] = useState(null);

  useEffect(()=>{
    const s=getSession();
    if(s){
      const found=getUsers().find(u=>u.username===s.username);
      if(found){setUser(found);setScreen("lobby");return;}
      clearSession();
    }
    setScreen("login");
  },[]);

  function login(u){ setUser(u); setScreen("lobby"); }
  function logout(){ clearSession(); setUser(null); setScreen("login"); }
  function startInterview(c){ setCandidate(c); setScreen("interview"); }
  function finishInterview(d){ setIntData(d); setScreen("report"); }
  function backToLobby(){
    const found=getUsers().find(u=>u.username===user.username);
    if(found){setUser(found);saveSession(found);}
    setScreen("lobby");
  }

  if(screen==="loading") return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{display:"flex",gap:7}}>
      {[0,1,2].map(i=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:C.teal,animation:`pulseGlow ${.5+i*.2}s ease-in-out infinite`}}/>)}
    </div>
  </div>;

  return <>
    {screen==="login"     && <LoginScreen    onLogin={login} onRegister={()=>setScreen("register")}/>}
    {screen==="register"  && <RegisterScreen onDone={login}  onLogin={()=>setScreen("login")}/>}
    {screen==="lobby"&&user&& <LobbyScreen  user={user} onStart={startInterview} onLogout={logout}/>}
    {screen==="interview"&&candidate&& <InterviewScreen candidate={candidate} onFinish={finishInterview}/>}
    {screen==="report"&&interviewData&& <ReportScreen data={interviewData} currentUser={user} onBack={backToLobby}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
